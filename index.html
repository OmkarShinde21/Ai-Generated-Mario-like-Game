<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Mario</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#5c94fc;
    font-family:Arial;
}
canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#5c94fc,#87ceeb);
}
#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="info">Score: 0</div>
<canvas id="game" width="1200" height="600"></canvas>
<!--email_off-->24f2006390@ds.study.iitm.ac.in<!--/email_off-->

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

const player = {
    x:100,
    y:200,
    w:40,
    h:50,
    vx:0,
    vy:0,
    speed:5,
    jump:15,
    grounded:false
};

let score = 0;

const gravity = 0.7;

const platforms = [
    {x:0,y:550,w:1200,h:50},
    {x:200,y:450,w:150,h:20},
    {x:450,y:380,w:180,h:20},
    {x:700,y:300,w:200,h:20},
    {x:980,y:220,w:150,h:20},
];

const enemies = [
    {x:260,y:420,w:35,h:30,dir:1,alive:true},
    {x:520,y:350,w:35,h:30,dir:-1,alive:true},
    {x:780,y:270,w:35,h:30,dir:1,alive:true},
    {x:1050,y:190,w:35,h:30,dir:-1,alive:true}
];

function rects(a,b){
    return (
        a.x < b.x+b.w &&
        a.x+a.w > b.x &&
        a.y < b.y+b.h &&
        a.y+a.h > b.y
    );
}

function updatePlayer(){

    if(keys["ArrowLeft"])
        player.vx = -player.speed;
    else if(keys["ArrowRight"])
        player.vx = player.speed;
    else
        player.vx *= 0.8;

    if(keys["Space"] && player.grounded){
        player.vy = -player.jump;
        player.grounded = false;
    }

    player.vy += gravity;

    player.x += player.vx;
    player.y += player.vy;

    player.grounded = false;

    for(const p of platforms){

        if(
            player.vy >= 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h >= p.y &&
            player.y + player.h <= p.y + 20
        ){
            player.y = p.y - player.h;
            player.vy = 0;
            player.grounded = true;
        }
    }

    if(player.y > canvas.height){
        alert("Game Over!");
        location.reload();
    }

    if(player.x > 1150){
        alert("YOU WIN! Score: " + score);
        location.reload();
    }
}

function updateEnemies(){

    for(const e of enemies){

        if(!e.alive) continue;

        e.x += e.dir * 1.5;

        if(e.x < 0 || e.x > canvas.width-e.w)
            e.dir *= -1;

        if(rects(player,e)){

            if(player.vy > 0 &&
               player.y + player.h < e.y + 15){

                e.alive = false;
                player.vy = -10;
                score += 100;
                document.getElementById("info").innerText =
                    "Score: " + score;
            }
            else{
                alert("Game Over!");
                location.reload();
            }
        }
    }
}

function drawCloud(x,y){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.arc(x+25,y,25,0,Math.PI*2);
    ctx.arc(x+50,y,20,0,Math.PI*2);
    ctx.fill();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawCloud(150,100);
    drawCloud(500,80);
    drawCloud(900,120);

    for(const p of platforms){
        ctx.fillStyle="#8B4513";
        ctx.fillRect(p.x,p.y,p.w,p.h);

        ctx.fillStyle="#228B22";
        ctx.fillRect(p.x,p.y,p.w,6);
    }

    for(const e of enemies){

        if(!e.alive) continue;

        ctx.fillStyle="#6b3e26";
        ctx.fillRect(e.x,e.y,e.w,e.h);

        ctx.fillStyle="white";
        ctx.fillRect(e.x+5,e.y+5,6,6);
        ctx.fillRect(e.x+22,e.y+5,6,6);
    }

    ctx.fillStyle="red";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="blue";
    ctx.fillRect(player.x,player.y+25,player.w,25);

    ctx.fillStyle="gold";
    ctx.fillRect(1140,140,20,80);

    ctx.fillStyle="green";
    ctx.fillRect(1160,140,50,30);
}

function loop(){

    updatePlayer();
    updateEnemies();
    draw();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
